kind: Deployment
apiVersion: apps/v1
metadata:
  name: nginx
  namespace: expense-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
     metadata:
      labels:
        app: nginx
     spec:
      containers:
       - name: nginx-con
         image: prakashgautam1998/nginx-app
         ports:
          - containerPort: 80


