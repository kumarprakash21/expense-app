apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: expense-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:   # 👈 IMPORTANT LEVEL
      containers:
        - name: mysql
          image: mysql:8.0

          ports:
            - containerPort: 3306

          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "Test@123"
            - name: MYSQL_DATABASE
              value: "expenses_tracker"

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql

      volumes:   # 👈 MUST BE HERE (same level as containers)
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
